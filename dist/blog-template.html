<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AK | ${title}</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="icon" type="image/x-icon" href="../../favicon.svg" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="../../index.html" class="logo-link">
          <div class="logo-item" data-src="../../assets/logo.svg"></div>
        </a>

        <button
          class="menu-toggle"
          id="menu-toggle"
          aria-label="Toggle navigation"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <ul class="nav-links" id="nav-links">
          <li><a href="../../gallery.html" class="nav-item">Gallery</a></li>
          <li><a href="../../projects.html" class="nav-item">Projects</a></li>
          <li><a href="../../blog.html" class="nav-item">Blog</a></li>
          <li>
            <a
              href="https://github.com/AKwasTaken"
              class="nav-item"
              target="_blank"
              >Github</a
            >
          </li>
          <li><a href="#" class="nav-item">Contact</a></li>
        </ul>
      </div>
    </nav>
    
    <div class="blog-content">
        <div class="blog-header">
            <h1 class="blog-heading">${title}</h1>
            <span class="blog-creation-time">${date}</span>
        </div>

        <div class="blog-body">
            ${content}
          <hr>
        </div>
    </div>

    <script src="../../js/nav_menu.js"></script>
    <script src="../../js/load_icons.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMath()"></script>
    
    <script>
      function renderMath() {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }
    </script>
  </body>
</html>
